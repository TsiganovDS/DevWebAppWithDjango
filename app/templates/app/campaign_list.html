{% extends 'app/base.html' %}
{% block title %}Список рассылок{% endblock %}

{% block content %}
<h1 class="mb-4">Рассылки</h1>
<a href="{% url 'app:campaign_create' message.id %}" class="btn btn-outline-success">➕ Создать рассылку</a>

<ul class="list-group">
  {% for campaign in object_list %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
      <span>Рассылка #{{ campaign.pk }}</span>
      <div class="btn-group">
        <a href="{% url 'app:campaign_detail' campaign.pk %}" class="btn btn-sm btn-outline-primary">Подробнее</a>
        <a href="{% url 'app:campaign_send' campaign.pk %}"
           class="btn btn-outline-warning"
           onclick="return confirm('Точно отправить рассылку {{ campaign.pk }}?')">
          📨 Отправить
        </a>
      </div>
    </li>
  {% empty %}
    <li class="list-group-item">Рассылок нет</li>
  {% endfor %}
</ul>
{% endblock %}
