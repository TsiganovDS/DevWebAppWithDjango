{% extends 'app/base.html' %}
{% block content %}
<form class="card-body text-center" method="post">
    <h1>{% if form.instance.pk %}Редактировать{% else %}Добавить{% endif %} получателя</h1>
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-outline-primary" type="submit">Сохранить</button>
    <a class="btn btn-outline-primary" href="{% url 'app:recipient_list' %}">Назад</a>
</form>
{% endblock %}
